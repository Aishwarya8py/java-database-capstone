version: "3.9"

# ──────────────────────────────────────────────────────────────────────────────
#  Hospital CMS – Docker Compose
#  Starts: MySQL 8, MongoDB 7, and the Spring Boot backend
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── MySQL 8 ──────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: hospital-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: hospital_cms
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MongoDB 7 ────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: hospital-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot App ──────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hospital-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hospital_cms?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/hospital_prescriptions
      APP_JWT_SECRET: c21hcnRjYXJlc29sdXRpb25zc2VjcmV0a2V5Zm9yaG9zcGl0YWxjbXMyMDI1
      APP_JWT_EXPIRATION_MS: "86400000"
      APP_CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500"
    depends_on:
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_healthy

volumes:
  mysql_data:
  mongo_data:
