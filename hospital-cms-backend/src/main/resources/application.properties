# ──────────────────────────────────────────────
#  Hospital CMS – Application Configuration
# ──────────────────────────────────────────────

spring.application.name=hospital-cms

# ── Server ──────────────────────────────────
server.port=8080

# ── MySQL (relational) ──────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/hospital_cms?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── MongoDB (documents / prescriptions) ─────
spring.data.mongodb.uri=mongodb://localhost:27017/hospital_prescriptions

# ── JWT ─────────────────────────────────────
# 256-bit Base64-encoded secret (change in production!)
app.jwt.secret=c21hcnRjYXJlc29sdXRpb25zc2VjcmV0a2V5Zm9yaG9zcGl0YWxjbXMyMDI1
app.jwt.expiration-ms=86400000

# ── CORS ────────────────────────────────────
app.cors.allowed-origins=http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500

# ── Logging ─────────────────────────────────
logging.level.com.smartcare=DEBUG
logging.level.org.springframework.security=WARN
